services:
  church-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: ecc-church-web:0.1
    restart: always
    ports:
      - "5174:5174"
    # No runtime env vars yet. Uncomment to pass a .env
    # (e.g. the future n8n webhook URL from the PRD).
    # env_file:
    #   - .env
    develop:
      watch:
        # Live-sync source changes into the container for Next.js HMR.
        - action: sync
          path: ./src
          target: /usr/local/app/src
        - action: sync
          path: ./app
          target: /usr/local/app/app
        - action: sync
          path: ./public
          target: /usr/local/app/public
        # Rebuild the image when dependencies change.
        - action: rebuild
          path: ./package.json
